name: Build GitHub Pages

# GitHub Pages for this repo is configured as a legacy branch deploy from
# `master` (root). That automatic `pages-build-deployment` publishes `web/`.
# Do not also call actions/deploy-pages here — concurrent deployments race and
# fail when semantic-release pushes a follow-up commit (see failed runs after
# merges that trigger both Release and Pages).
#
# This workflow only verifies `scripts/build-pages.mjs` still produces `_site/`.
# To publish exclusively from Actions later, switch Pages → "GitHub Actions"
# and restore an actions/deploy-pages job.

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Build static site
        run: node scripts/build-pages.mjs

      - name: Verify site artifact
        run: |
          test -f _site/index.html
          test -f _site/web/index.html
          test -f _site/web/cpu.js
          test -f _site/web/vendor/stockfish/stockfish-18-lite-single.wasm
          test ! -f _site/web/index.php
          test ! -f _site/web/chess.py
          du -sh _site
